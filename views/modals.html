<!-- Inline New Customer (from Order Entry) -->
<div class="modal-overlay" id="modal-customer">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3>👤 New Customer</h3>
      <button class="btn-close-modal" onclick="Modal.close('modal-customer')">
        ✕
      </button>
    </div>
    <div class="modal-body">
      <form id="customer-form" novalidate>
        <input type="hidden" id="cust-id-hidden" />
        <div class="form-group">
          <label>Name <span class="required">*</span></label>
          <input type="text" id="cust-name" placeholder="Full name" />
          <div class="field-error" style="display: none"></div>
        </div>
        <div class="form-group">
          <label>Phone</label
          ><input type="text" id="cust-phone" placeholder="555-0100" />
        </div>
        <div class="form-group">
          <label>Email</label
          ><input type="email" id="cust-email" placeholder="name@email.com" />
        </div>
        <div class="form-group">
          <label>Address</label
          ><input type="text" id="cust-address" placeholder="Street address" />
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('modal-customer')">
        Cancel
      </button>
      <button class="btn btn-gold" id="btn-save-customer-inline">
        Save Customer
      </button>
    </div>
  </div>
</div>

<!-- Subcategory Modal -->
<div class="modal-overlay" id="modal-sub">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3 id="sub-modal-title">Subcategory</h3>
      <button class="btn-close-modal" onclick="Modal.close('modal-sub')">
        ✕
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Category <span class="required">*</span></label>
        <select id="sub-cat-id"></select>
      </div>
      <div class="form-group">
        <label>Name <span class="required">*</span></label>
        <input type="text" id="sub-name" placeholder="e.g. Leather, Denim…" />
      </div>
      <div class="form-group">
        <label>Subcategory Image</label>
        <input
          type="file"
          id="sub-image-file"
          accept="image/*"
          style="display: none"
        />
        <input type="hidden" id="sub-image-url" />
        <div
          style="display: flex; align-items: center; gap: 12px; margin-top: 6px"
        >
          <button
            type="button"
            class="btn btn-ghost btn-sm"
            onclick="document.getElementById('sub-image-file').click()"
            style="padding: 6px 12px; font-size: 12px"
          >
            🖼️ Choose Image…
          </button>
          <span
            id="sub-image-filename"
            class="text-muted"
            style="
              font-size: 11px;
              max-width: 150px;
              overflow: hidden;
              text-overflow: ellipsis;
              white-space: nowrap;
            "
            >No image chosen</span
          >
        </div>
        <div
          id="sub-image-preview-wrap"
          style="display: none; margin-top: 10px"
        >
          <img
            id="sub-image-preview"
            src=""
            alt="Preview"
            style="
              width: 80px;
              height: 80px;
              object-fit: cover;
              border-radius: 6px;
              border: 1px solid var(--border);
              box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            "
          />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('modal-sub')">
        Cancel
      </button>
      <button class="btn btn-gold" id="btn-save-sub">Save</button>
    </div>
  </div>
</div>

<!-- User Modal -->

<!-- Measurements Modal (for Jacket > Subcategory) -->

    </div>

          gap: 16px;

            Man</label
          >
          <label
            ><input type="radio" name="meas-gender" value="Women" />
            Women</label
          >
        </div>
      </div>

      <!-- Formatting measurements grid -->
      <div
        class="grid-6"
        style="column-gap: 12px; row-gap: 12px; margin-bottom: 12px"

        <div class="form-group">
          <label>Length</label><input type="text" id="meas-length" />
        </div>
        <div class="form-group">
          <label>Chest</label><input type="text" id="meas-chest" />
        </div>
        <div class="form-group">
          <label>Waist</label><input type="text" id="meas-waist" />
        </div>
        <div class="form-group">
          <label>Hips</label><input type="text" id="meas-hips" />
        </div>
        <div class="form-group">
          <label>Shoulder</label><input type="text" id="meas-shoulder" />
        </div>
        <div class="form-group">
          <label>Sleeves</label><input type="text" id="meas-sleeves" />
        </div>
        <div class="form-group">
          <label>Front</label><input type="text" id="meas-front" />
        </div>
        <div class="form-group">
          <label>Back</label><input type="text" id="meas-back" />
        </div>
        <div class="form-group">
          <label>Neck</label><input type="text" id="meas-neck" />
        </div>
      </div>

      <!-- Characteristics checkboxes -->
      <div class="form-group">
        <label>Characteristics</label>
        <div class="grid-4" style="gap: 8px">
          <label
            ><input type="checkbox" id="meas-chk-shoulder" /> Shoulder
            tilt</label
          >
          <label
            ><input type="checkbox" id="meas-chk-hunchback" /> Hunchback</label
          >
          <label
            ><input type="checkbox" id="meas-chk-belly" /> Have Belly</label
          >
          <label
            ><input type="checkbox" id="meas-chk-arched" /> Arched back</label
          >
        </div>
      </div>

      <!-- Order Info -->
      <div class="order-qty-row" style="margin-top: 20px">
        <div class="form-group" style="margin: 0; flex: 1">
          <label>Quantity</label>
          <input type="number" id="meas-qty" value="1" min="0.1" step="0.1" />
        </div>
        <div class="form-group" style="margin: 0; flex: 1">
          <label>Color</label>
          <input type="text" id="meas-color" placeholder="e.g. Black" />
        </div>
        <div class="form-group" style="margin: 0; flex: 1">
          <label>Unit Price</label>
          <input
            type="number"
            id="meas-unit-price"
            placeholder="0.00"
            min="0"
            step="0.01"
          />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('modal-measurements')">
        Cancel
      </button>
      <button
        class="btn btn-gold"
        id="btn-save-meas"
        onclick="OrdersPage.addLineItemFromModal()"
      >
        ＋ Add to Order
      </button>
    </div>
  </div>
</div>
